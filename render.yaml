# Render Blueprint for the Go backend.
# In the Render dashboard: New → Blueprint → connect this repo. Render reads this
# file and provisions the service. Set DATABASE_URL and CORS_ORIGINS when prompted
# (they're marked sync:false so they're never committed); JWT_SECRET is generated.
services:
  - type: web
    name: task-manager-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon connection string
      - key: CORS_ORIGINS
        sync: false # set to your deployed Vercel URL, e.g. https://your-app.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_TTL_HOURS
        value: "72"
