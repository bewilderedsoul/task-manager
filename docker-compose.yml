# One-command local setup:  docker compose up --build
# Brings up PostgreSQL, the Go API, and the Next.js frontend.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: taskmanager
      POSTGRES_DB: taskmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://taskmanager:taskmanager@db:5432/taskmanager?sslmode=disable
      JWT_SECRET: local-dev-secret-change-in-production-please
      JWT_TTL_HOURS: "72"
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time; the browser calls the API
        # on the host, so localhost is correct here.
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
